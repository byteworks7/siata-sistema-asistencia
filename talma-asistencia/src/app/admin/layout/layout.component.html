<div class="layout-wrapper">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="Logo.webp" alt="Talma" class="logo-img"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <div class="logo-fallback">TALMA</div>
      <span class="logo-text">SIATA</span>
    </div>

    <div class="sidebar-section">ADMINISTRACIÓN</div>

    <nav class="sidebar-nav">
      <a routerLink="dashboard"      routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a routerLink="horarios"       routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📅</span>
        <span>Horarios</span>
      </a>
      <a routerLink="trabajadores"   routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👥</span>
        <span>Trabajadores</span>
      </a>
      <a routerLink="asistencias"    routerLinkActive="active" class="nav-item">
        <span class="nav-icon">✅</span>
        <span>Asistencias</span>
      </a>
      <a routerLink="amonestaciones" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">⚠️</span>
        <span>Amonestaciones</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ usuario()?.nombre?.charAt(0) }}</div>
        <div class="user-details">
          <span class="user-name">{{ usuario()?.nombre }}</span>
          <span class="user-role">Administrador</span>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()" title="Cerrar sesión">⏻</button>
    </div>
  </div>

  <!-- Contenido -->
  <div class="main-content">
    <div class="top-bar">
      <div class="top-title">Panel Administrativo</div>
      <div class="top-info">
        <span class="top-date">{{ today | date:'EEEE, d MMMM yyyy':'':'es' }}</span>
      </div>
    </div>

    <div class="page-content">
      <router-outlet />
    </div>
  </div>

</div>
