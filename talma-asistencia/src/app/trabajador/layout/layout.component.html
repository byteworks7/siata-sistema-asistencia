<div class="layout-wrapper">

  <!-- Header -->
  <div class="layout-header">
    <div class="header-left">
      <img src="Logo.webp" alt="Talma" class="header-logo"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <div class="header-logo-fallback">TALMA</div>
      <div class="header-sep"></div>
      <div>
        <span class="header-title">SIATA</span>
        <span class="header-sub">Sistema de Asistencia</span>
      </div>
    </div>

    <div class="header-center">
      <a routerLink="calendario" routerLinkActive="active" class="nav-link">
        📅 Calendario
      </a>
    </div>

    <div class="header-right">
      <div class="user-info">
        <div class="user-avatar">{{ usuario()?.nombre?.charAt(0) }}</div>
        <div class="user-details">
          <span class="user-name">{{ usuario()?.nombre }}</span>
          <span class="user-role">{{ usuario()?.cargo }} • {{ usuario()?.area }}</span>
        </div>
      </div>
      <button class="btn-logout" (click)="logout()">
        Cerrar sesión
      </button>
    </div>
  </div>

  <!-- Contenido -->
  <div class="layout-content">
    <router-outlet />
  </div>

</div>
